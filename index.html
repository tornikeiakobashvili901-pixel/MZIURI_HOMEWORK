<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Movie Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h2 >my favorite movies</h2>
    <form id="movie-form">
        <input type="text" id="title" placeholder="ფილმის სახელი" required>
        <input type="number" id="year" placeholder="წელი" required>
        <button >დამატება</button>
    </form>

    <button id="clear-all">სიის გასუფთავება</button>

    <ul id="movie-list"></ul>
    
    <script src="script.js"></script>
    </div>
</body>
</html>
